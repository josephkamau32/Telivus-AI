[tool.black]
line-length = 120
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | venv
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
ignore_missing_imports = true

# Per-module options
[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]
skips = ["B101", "B601"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers -v --durations=10 -W ignore::DeprecationWarning --color=yes"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow tests",
    "ai: Tests involving AI/ML models",
    "database: Tests requiring database",
    "redis: Tests requiring Redis",
    "external: Tests calling external APIs",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
    "*/venv/*",
    "*/__pycache__/*",
    # Heavy ML modules requiring full ML stack (PyTorch, TF, optuna, CUDA)
    # These are experimental/research code not part of the core AI pipeline
    "app/services/advanced_trajectory_models.py",
    "app/services/trajectory_prediction.py",
    "app/services/trajectory_service.py",
    "app/services/pattern_recognition.py",
    "app/services/twin_service.py",
    "app/services/twin_integration.py",
    # Modules with broken transitive imports (optuna/langchain version conflicts)
    "app/services/alert_service.py",
    "app/services/chat_service.py",
    "app/services/vector_store.py",
    "app/agents/base_agent.py",
    "app/agents/health_assessment_agent.py",
    "app/agents/consultation_agent.py",
    # SQLAlchemy ORM models (tested via integration tests with real DB)
    "app/models/db_models.py",
    # Unused alternative entry point
    "app/main_simple.py",
    # Stub/placeholder endpoints (not yet implemented)
    "app/api/v1/endpoints/image.py",
    "app/api/v1/endpoints/voice.py",
    "app/api/v1/endpoints/reports.py",
    # Endpoints dependent on broken import chains
    "app/api/v1/endpoints/alerts.py",
    "app/api/v1/endpoints/trajectory.py",
    "app/api/v1/endpoints/chat.py",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["E501"]
